# -name: 飞书下班祝福

on:
  schedule:
    - cron: '55 9 * * 1-5'  # UTC 09:55 = 北京 17:55，周一到周五

  workflow_dispatch:

jobs:
  send-off-work:
    runs-on: ubuntu-latest

    steps:
      - name: 安装 jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: 检查时间
        run: |
          echo "📅 当前时间信息："
          echo "UTC 时间: $(date -u)"
          echo "北京时间: $(TZ='Asia/Shanghai' date)"
          echo "星期几: $(date +%u)"
          echo ""

      - name: 判断工作日还是周末
        run: |
          DAY_OF_WEEK=$(date +%u)
          if [ "$DAY_OF_WEEK" -ge 6 ]; then
            echo "📅 今天是周末"
            echo "IS_WEEKEND=true" >> $GITHUB_ENV
          else
            echo "📅 今天是工作日"
            echo "IS_WEEKEND=false" >> $GITHUB_ENV
          fi

      - name: 获取飞书 Token
        id: get_token
        run: |
          echo "🔑 获取飞书访问令牌..."

          APP_ID="${{ secrets.FEISHU_APP_ID }}"
          APP_SECRET="${{ secrets.FEISHU_APP_SECRET }}"

          if [ -z "$APP_ID" ] || [ -z "$APP_SECRET" ]; then
            echo "❌ 缺少 FEISHU_APP_ID 或 FEISHU_APP_SECRET"
            echo "请在仓库设置中添加这两个 Secrets"
            exit 1
          fi

          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$APP_ID\",\"app_secret\":\"$APP_SECRET\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.tenant_access_token')
          CODE=$(echo "$RESPONSE" | jq -r '.code')

          if [ "$CODE" != "0" ] || [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "❌ 获取 token 失败"
            echo "错误码: $CODE"
            echo "错误信息: $(echo $RESPONSE | jq -r '.msg')"
            exit 1
          fi

          echo "✅ Token 获取成功"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: 获取群聊列表
        id: get_chats
        run: |
          echo "📋 获取群聊列表..."

          TOKEN="${{ steps.get_token.outputs.token }}"

          RESPONSE=$(curl -s -X GET "https://open.feishu.cn/open-apis/im/v1/chats?page_size=50&user_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")

          CODE=$(echo "$RESPONSE" | jq -r '.code')

          if [ "$CODE" != "0" ]; then
            echo "❌ 获取群聊列表失败"
            echo "错误码: $CODE"
            echo "错误信息: $(echo $RESPONSE | jq -r '.msg')"
            exit 1
          fi

          echo "✅ 群聊列表获取成功"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: 解析群聊信息
        id: parse_chats
        run: |
          RESPONSE="${{ steps.get_chats.outputs.response }}"

          echo "解析群聊信息..."

          CHAT_COUNT=$(echo "$RESPONSE" | jq '.data.items | length')
          echo "群聊数量: $CHAT_COUNT"

          if [ "$CHAT_COUNT" -eq 0 ]; then
            echo "❌ 没有找到任何群聊"
            echo "请确保机器人已添加到群聊"
            exit 1
          fi

          echo "✅ 找到 $CHAT_COUNT 个群聊"
          echo ""

          echo "群聊列表："
          echo "$RESPONSE" | jq -r '.data.items[] | "  - \(.name // \"未命名\") (ID: \(.chat_id))"'

      - name: 发送消息到群聊
        id: send_messages
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"
          RESPONSE="${{ steps.get_chats.outputs.response }}"

          echo "🚀 开始发送消息..."

          if [ "$IS_WEEKEND" == "true" ]; then
            echo "使用周末文案"
            MESSAGE="🎉 周末快乐！好好休息，享受美好时光！"
          else
            echo "使用工作日文案"
            MESSAGE="🌅 又是充实的一天，辛苦了！愿你傍晚时光轻松惬意！"
          fi

          echo "发送文案: $MESSAGE"
          echo ""

          CHATS=$(echo "$RESPONSE" | jq -r '.data.items[] | @base64')

          SUCCESS_COUNT=0
          FAIL_COUNT=0

          while IFS= read -r chat; do
            chat_data=$(echo "$chat" | base64 -d)
            chat_id=$(echo "$chat_data" | jq -r '.chat_id')
            chat_name=$(echo "$chat_data" | jq -r '.name // "未命名"')

            echo "📤 发送到「$chat_name」 (ID: $chat_id)..."

            SEND_RESPONSE=$(curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"receive_id\":\"$chat_id\",\"msg_type\":\"text\",\"content\":\"{\\\"text\\\":\\\"$MESSAGE\\\"}\"}")

            echo "发送响应: $SEND_RESPONSE"

            SEND_CODE=$(echo "$SEND_RESPONSE" | jq -r '.code')

            if [ "$SEND_CODE" == "0" ]; then
              echo "✅ 发送成功"
              ((SUCCESS_COUNT++))
            else
              echo "❌ 发送失败"
              echo "错误码: $SEND_CODE"
              echo "错误信息: $(echo $SEND_RESPONSE | jq -r '.msg')"
              ((FAIL_COUNT++))
            fi

            echo ""
          done <<< "$CHATS"

          echo "================================"
          echo "📊 发送完成"
          echo "================================"
          echo "✅ 成功: $SUCCESS_COUNT 个群聊"
          echo "❌ 失败: $FAIL_COUNT 个群聊"
          echo "================================"

          if [ "$SUCCESS_COUNT" -eq 0 ]; then
            echo "❌ 所有群聊发送失败"
            exit 1
          fi

      - name: 执行完成
        if: always()
        run: |
          echo "================================"
          echo "✅ 执行完成"
          echo "================================"
