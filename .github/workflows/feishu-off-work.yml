name: 飞书下班祝福

on:
  schedule:
    - cron: '50 9 * * *'
  workflow_dispatch:

jobs:
  send-off-work:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 发送消息
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python send_feishu.py
