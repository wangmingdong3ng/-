name: 飞书下班祝福

on:
  schedule:
    - cron: '55 9 * * 1-5'  # UTC 09:55 = 北京 17:55，周一到周五

  workflow_dispatch:

jobs:
  send-off-work:
    runs-on: ubuntu-latest

    steps:
      - name: 检查时间
        run: |
          echo "📅 当前时间信息："
          echo "UTC 时间: $(date -u)"
          echo "北京时间: $(TZ='Asia/Shanghai' date)"
          echo "星期几: $(date +%u)"
          echo ""

      - name: 判断工作日还是周末
        run: |
          DAY_OF_WEEK=$(date +%u)
          if [ "$DAY_OF_WEEK" -ge 6 ]; then
            echo "📅 今天是周末"
            echo "IS_WEEKEND=true" >> $GITHUB_ENV
          else
            echo "📅 今天是工作日"
            echo "IS_WEEKEND=false" >> $GITHUB_ENV
          fi

      - name: 获取飞书 Token
        id: get_token
        run: |
          echo "🔑 获取飞书访问令牌..."

          APP_ID="${{ secrets.FEISHU_APP_ID }}"
          APP_SECRET="${{ secrets.FEISHU_APP_SECRET }}"

          if [ -z "$APP_ID" ] || [ -z "$APP_SECRET" ]; then
            echo "❌ 缺少 FEISHU_APP_ID 或 FEISHU_APP_SECRET"
            echo "请在仓库设置中添加这两个 Secrets"
            exit 1
          fi

          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$APP_ID\",\"app_secret\":\"$APP_SECRET\"}")

          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('tenant_access_token', ''))")
          CODE=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('code', -1))")

          if [ "$CODE" != "0" ] || [ -z "$TOKEN" ]; then
            echo "❌ 获取 token 失败"
            echo "错误码: $CODE"
            echo "错误信息: $(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('msg', 'unknown'))")"
            exit 1
          fi

          echo "✅ Token 获取成功"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: 获取群聊列表
        id: get_chats
        run: |
          echo "📋 获取群聊列表..."

          TOKEN="${{ steps.get_token.outputs.token }}"

          RESPONSE=$(curl -s -X GET "https://open.feishu.cn/open-apis/im/v1/chats?page_size=50&user_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")

          CODE=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('code', -1))")

          if [ "$CODE" != "0" ]; then
            echo "❌ 获取群聊列表失败"
            echo "错误码: $CODE"
            echo "错误信息: $(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('msg', 'unknown'))")"
            exit 1
          fi

          echo "✅ 群聊列表获取成功"
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: 解析群聊信息
        id: parse_chats
        run: |
          RESPONSE="${{ steps.get_chats.outputs.response }}"

          echo "解析群聊信息..."

          python3 << 'EOF'
import sys, json

data = json.loads(sys.stdin.read())
chats = data.get('data', {}).get('items', [])

print(f"群聊数量: {len(chats)}")

if len(chats) == 0:
    print("❌ 没有找到任何群聊")
    print("请确保机器人已添加到群聊")
    sys.exit(1)

print("✅ 找到 {} 个群聊".format(len(chats)))
print("")
print("群聊列表：")

for chat in chats:
    name = chat.get('name', '未命名')
    chat_id = chat.get('chat_id', '')
    print(f"  - {name} (ID: {chat_id})")
EOF
          echo "$RESPONSE" >> $GITHUB_OUTPUT

      - name: 发送消息到群聊
        id: send_messages
        run: |
          TOKEN="${{ steps.get_token.outputs.token }}"
          RESPONSE="${{ steps.get_chats.outputs.response }}"

          echo "🚀 开始发送消息..."

          if [ "$IS_WEEKEND" == "true" ]; then
            echo "使用周末文案"
            MESSAGE="🎉 周末快乐！好好休息，享受美好时光！"
          else
            echo "使用工作日文案"
            MESSAGE="🌅 又是充实的一天，辛苦了！愿你傍晚时光轻松惬意！"
          fi

          echo "发送文案: $MESSAGE"
          echo ""

          python3 << 'PYEOF'
import sys, json, subprocess, os

# 从环境变量获取
token = os.environ.get('TOKEN', '')
response = os.environ.get('RESPONSE', '')
is_weekend = os.environ.get('IS_WEEKEND', 'false') == 'true'

# 选择消息
if is_weekend:
    message = "🎉 周末快乐！好好休息，享受美好时光！"
else:
    message = "🌅 又是充实的一天，辛苦了！愿你傍晚时光轻松惬意！"

print(f"发送文案: {message}")
print("")

# 解析群聊列表
data = json.loads(response)
chats = data.get('data', {}).get('items', [])

success_count = 0
fail_count = 0

for chat in chats:
    chat_id = chat.get('chat_id', '')
    chat_name = chat.get('name', '未命名')
    
    print(f"📤 发送到「{chat_name}」 (ID: {chat_id})...")
    
    # 发送消息
    send_url = f"https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id"
    headers = {
        "Authorization": f"Bearer {token}",
        "Content-Type": "application/json"
    }
    payload = {
        "receive_id": chat_id,
        "msg_type": "text",
        "content": json.dumps({"text": message})
    }
    
    result = subprocess.run([
        'curl', '-s', '-X', 'POST', send_url,
        '-H', f"Authorization: Bearer {token}",
        '-H', 'Content-Type: application/json',
        '-d', json.dumps(payload)
    ], capture_output=True, text=True)
    
    send_response = result.stdout
    print(f"发送响应: {send_response}")
    
    send_data = json.loads(send_response)
    send_code = send_data.get('code', -1)
    
    if send_code == 0:
        print("✅ 发送成功")
        success_count += 1
    else:
        print("❌ 发送失败")
        print(f"错误码: {send_code}")
        print(f"错误信息: {send_data.get('msg', 'unknown')}")
        fail_count += 1
    
    print("")

print("=" * 32)
print("📊 发送完成")
print("=" * 32)
print(f"✅ 成功: {success_count} 个群聊")
print(f"❌ 失败: {fail_count} 个群聊")
print("=" * 32)

if success_count == 0:
    print("❌ 所有群聊发送失败")
    sys.exit(1)
PYEOF
        env:
          TOKEN: ${{ steps.get_token.outputs.token }}
          RESPONSE: ${{ steps.get_chats.outputs.response }}
          IS_WEEKEND: ${{ env.IS_WEEKEND }}

      - name: 执行完成
        if: always()
        run: |
          echo "================================"
          echo "✅ 执行完成"
          echo "================================"
